<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ff6b35;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0.3" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,215,0,0.1)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="400" fill="url(#bannerGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <circle cx="200" cy="200" r="150" fill="rgba(255,107,53,0.1)"/>
  <circle cx="1000" cy="100" r="100" fill="rgba(255,215,0,0.1)"/>
  <circle cx="800" cy="300" r="80" fill="rgba(255,107,53,0.15)"/>
</svg>